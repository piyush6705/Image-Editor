<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Editor</title>
  <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <section>
      <div class="left">
        <div class="top">
          <label for="image-input" class="btn" id="choose-btn">
            Choose image
            <input type="file" accept="image/*" id="image-input" hidden>
          </label>
          <button class="btn" id="reset-btn">Reset</button>
          <button class="btn" id="download-btn">Download image</button>
        </div>
        <div class="bottom">
          <div class="image-container">
            <div class="placeholder">
              <i class="ri-image-line"></i>
              <p>Image</p>
            </div>
            <canvas id="image-canvas"></canvas>
          </div>
          
        </div>
      </div>
      <div class="right">
        <div class="filters">
          
        </div>
        <div class="presets">
          <h3>Preset Filters</h3>
          <div class="preset-buttons">
            <button class="preset-btn" data-filter="original">Original</button>
            <button class="preset-btn" data-filter="vintage">Vintage</button>
            <button class="preset-btn" data-filter="cold">Cold</button>
            <button class="preset-btn" data-filter="warm">Warm</button>
            <button class="preset-btn" data-filter="dramatic">Dramatic</button>
            <button class="preset-btn" data-filter="dark">Dark</button>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
